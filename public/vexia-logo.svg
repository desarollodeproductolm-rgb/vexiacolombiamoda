<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="Vexia Logo">
  <!-- Icon: hands/collaboration mark in orange -->
  <g transform="translate(0, 0)">
    <!-- Outer square frame -->
    <rect x="4" y="4" width="52" height="52" rx="6" fill="#e5662d"/>
    <!-- Simplified fist/thumb up shape (white cutout) -->
    <rect x="12" y="30" width="36" height="4" rx="2" fill="#f0e8dc" opacity="0.9"/>
    <rect x="12" y="37" width="36" height="4" rx="2" fill="#f0e8dc" opacity="0.9"/>
    <!-- Thumb up representation -->
    <circle cx="30" cy="18" r="8" fill="#f0e8dc" opacity="0.9"/>
    <rect x="24" y="18" width="12" height="14" rx="2" fill="#f0e8dc" opacity="0.9"/>
  </g>
  <!-- Wordmark: "vexia" -->
  <text
    x="68"
    y="44"
    font-family="'Visby CF', 'Inter', Arial, sans-serif"
    font-weight="700"
    font-size="36"
    fill="#f0e8dc"
    letter-spacing="-1"
  >vexia</text>
</svg>
